name: Bug report
description: Report a reproducible problem in a TrustCode public repository.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping us improve TrustCode System. Do not include secrets, private client data, or vulnerability details.
  - type: input
    id: repository
    attributes:
      label: Repository or product
      description: Which TrustCode repository, product, or deployment is affected?
      placeholder: Atlas-HR, PetroBrainWeb, trustcode-system-website...
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Affected URL, endpoint, or component
      placeholder: https://trustcodesystem.tech/... or src/path/to/component
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Web or browser interface
        - Mobile interface
        - API or backend service
        - Cloud or deployment infrastructure
        - Security tooling or detection
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Chrome 136, Node.js 22, Python 3.12, commit SHA...
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or additional context
