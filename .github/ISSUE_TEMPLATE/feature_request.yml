name: Feature request
description: Suggest an improvement to a TrustCode public project or developer workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: input
    id: repository
    attributes:
      label: Repository or product
      description: Which TrustCode repository or product should change?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and its value.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Success measure and additional context
      description: How will we know this change delivered value?
